<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

  <title>Doctor Registration</title>

  <link rel="stylesheet"
        href="assets/css/style.css">

  <link rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/chosen-js@1.8.7/chosen.min.css">

</head>

<body>
<button class="back-btn" onclick="history.back()">
  ← Back
</button>
<header class="navbar">
  <div class="logo">MedFinder</div>

  <nav>
    <a href="index.html">Home</a>
    <a href="doctors.html">Doctors</a>
    <a href="hospitals.html">Hospitals</a>
    <div id="authButtons"></div>
  </nav>
</header>
<div class="register-page">

<form class="register-card"
      id="registerForm"
      enctype="multipart/form-data"
      novalidate>

    <h1>
      Doctor Registration
    </h1>

    <p>
      Create your professional doctor profile
    </p>

    <div class="register-field">

      <label>Full Name</label>

      <input type="text"
             id="name"
             placeholder="Enter full name">

    </div>

   <div class="register-field">
  <label>Email Address</label>

  <input
    type="email"
    id="email"
    placeholder="Enter email"

  >
</div>
    <div class="register-field">
  <label>Password</label>

  <input
    type="password"
    id="password"
    placeholder="Min 8 chars, 1 letter, 1 number, 1 special symbol"

  >
</div>
   <div class="register-field">

  <label>Phone Number</label>

<input
  type="tel"
  id="phone"
  placeholder="Enter 10 digit phone number"
  maxlength="10"
  inputmode="numeric"
  autocomplete="tel"
  onkeypress="return event.charCode >= 48 && event.charCode <= 57"

>

</div>

    <div class="register-field">

      <label>Degree</label>

<select id="qualification" class="chosen-select">
  <option value="">Select Degree</option>
</select>

    </div>

    <div class="register-field">

  <label>Specialization</label>

  <select id="specialization" class="chosen-select">
    <option value="">Select Specialization</option>
  </select>

</div>

    <div class="register-field">

      <label>Consulting Fee</label>

      <input type="number"
             id="consulting_fee"
             placeholder="₹ Enter fee">

    </div>

    <div class="register-field">

      <label>Availability Status</label>

      <select id="availability_status" class="chosen-select"></select>

    </div>

    <div class="register-field">

      <label>Professional Description</label>

      <textarea id="description"
                placeholder="Write about your experience"></textarea>

    </div>

    <div class="register-field">

      <label>Profile Image</label>

      <input type="file"
             id="profile_image">

    </div>

    <button type="submit"
            class="register-btn">

      Register

    </button>

    <div class="register-login">

      Already have an account?

      <a href="login.html">
        Login
      </a>

    </div>

  </form>

</div>

<footer class="site-footer">
  <p>© 2026 MedFinder. All rights reserved.</p>
</footer>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chosen-js@1.8.7/chosen.jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="assets/js/form-validation.js"></script>
<script src="assets/js/notify.js"></script>
<script src="assets/js/api.js"></script>
<script src="assets/js/register.js"></script>
<script src="assets/js/navbar.js"></script>

</body>

</html>
