<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Doctors</title>

  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/chosen-js@1.8.7/chosen.min.css">
</head>
<body>

<header class="navbar">

  <div class="logo">
    MedFinder
  </div>

  <nav>

    <a href="index.html">Home</a>

    <a href="doctors.html">Doctors</a>

    <a href="hospitals.html">Hospitals</a>

    <div id="authButtons"></div>

  </nav>

</header>
<button class="back-btn" onclick="history.back()">
  ← Back
</button>
<section class="hospital-hero doctors-hero">
  <div>
    <span class="hero-badge">Verified Medical Experts</span>

    <h1>Find Trusted Doctors Near You</h1>

    <p>
      Search approved doctors by name, qualification, specialization,
      availability status and consulting fee.
    </p>
  </div>
</section>

<div class="filter-bar premium-filter">

  <input
    type="text"
    id="doctorSearch"
    placeholder="Search doctor, specialization, hospital, city..."
  />

  <select id="specializationFilter" class="chosen-select">
    <option value="">All Specializations</option>
  </select>

  <select id="cityFilter" class="chosen-select">
    <option value="">All Locations</option>
  </select>

<select id="availabilityFilter" class="chosen-select">
  <option value="">All Status</option>
</select>

  <button onclick="filterDoctors()" class="search-btn">
    Search
  </button>

  <button onclick="clearDoctorFilters()" class="clear-btn">
    Clear
  </button>

</div>
<section class="page-header">
  <h1>Our Doctors</h1>
</section>

<section>
  <div class="doctor-grid" id="doctorGrid"></div>
</section>
<footer class="site-footer">
  <p>© 2026 MedFinder. All rights reserved.</p>
</footer>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chosen-js@1.8.7/chosen.jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="assets/js/notify.js"></script>
<script src="assets/js/api.js"></script>
<script src="assets/js/doctors.js"></script>
<script src="assets/js/navbar.js"></script>
</body>
</html>
